server:
  port: 7171

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ad?sslmode=disable&authenticationMethod=SCRAM-SHA-256
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    consumer:
      group-id: your-consumer-group-id
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

app:
  rest-client:
    events:
      base-url: http://localhost:8071/api/events
      path-variable: since
  kafka:
    topics:
      impression-topic: impression-topic
      click-topic: click-topic

  redis:
    keys:
      last-event-time: last-event-time
